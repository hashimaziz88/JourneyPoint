name: Frontend CI

on:
  push:
    branches: ["main"]
    paths:
      - "journeypoint/**"
  pull_request:
    branches: ["main"]
    paths:
      - "journeypoint/**"

jobs:
  lint-and-build:
    name: Lint & Build (Next.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: journeypoint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: journeypoint/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build
        run: npm run build

  playwright:
    name: Playwright Tests (Next.js)
    runs-on: ubuntu-latest
    needs: lint-and-build
    timeout-minutes: 60

    defaults:
      run:
        working-directory: journeypoint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: journeypoint/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: journeypoint/playwright-report/
          retention-days: 5
